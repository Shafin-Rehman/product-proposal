name: Backend CI

on:
  push:
    branches: [feature/add-expense-6]
    paths:
      - 'backend/**'
  pull_request:
    branches: [feature/add-expense-6]
    paths:
      - 'backend/**'

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm test -- --coverage
