name: DB Migrations

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/db-migrate.yml'
  pull_request_target:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/db-migrate.yml'

permissions:
  contents: read

jobs:
  test-migration:
    if: github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Dry-run migrations
        run: supabase db push --db-url "${{ secrets.DATABASE_URL }}" --dry-run

  deploy-production:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Apply migrations to production
        run: supabase db push --db-url "${{ secrets.DATABASE_URL }}" --yes
