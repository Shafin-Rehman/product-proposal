name: Deploy to Vercel

"on":
  push:
    branches: [main, cloud-deployment]
    paths:
      - 'nextjs/**'
      - '.github/workflows/deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nextjs/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: nextjs

      - name: Build application
        run: npm run build
        working-directory: nextjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Create deployment zip
        run: |
          zip -r budgetbuddy-deploy-${{ github.sha }}.zip nextjs \
            --exclude "nextjs/node_modules/*" \
            --exclude "nextjs/.next/cache/*"

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: budgetbuddy-deploy-${{ github.sha }}
          path: budgetbuddy-deploy-${{ github.sha }}.zip
          retention-days: 7

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy to Vercel
        run: vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
