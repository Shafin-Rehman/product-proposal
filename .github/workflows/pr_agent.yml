name: AI PR Reviewer
on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created, edited]

jobs:
  pr_agent:
    if: ${{ github.event.sender.type != 'Bot' && ((github.event_name == 'pull_request' && github.event.pull_request.draft == false) || (github.event_name == 'issue_comment' && github.event.issue.pull_request)) }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - name: PR Agent
        uses: Codium-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # PR-Agent has no "NVIDIA" section. The NVIDIA URL is an OpenAI-*compatible* HTTP API, so
          # the tool sets [openai].api_key + [openai].api_base. LiteLLM is the client library PR-Agent
          # uses; your key and model are still DeepSeek on NVIDIA.
          OPENAI_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI.API_BASE: "https://integrate.api.nvidia.com/v1"

          # LiteLLM uses the openai/ prefix for OpenAI-compatible custom endpoints, then sends the
          # unprefixed model name to NVIDIA's API.
          config.model: "openai/deepseek-ai/deepseek-v4-pro"
          config.fallback_models: '["openai/deepseek-ai/deepseek-v4-pro"]'
          config.ai_timeout: "300"
          config.large_patch_policy: "clip"
          # Helps /improve when the model needs stronger few-shot style prompts for structured output.
          config.duplicate_prompt_examples: "true"

          # On each matching PR event: /describe (PR summary) -> /review -> /improve.
          # "Failed to generate code suggestions" = /improve threw; see Actions log for the exception.
          github_action_config.auto_describe: "true"
          github_action_config.auto_review: "true"
          github_action_config.auto_improve: "true"
          # Run when the PR is opened, reopened, marked ready, or the branch is pushed (synchronize).
          github_action_config.pr_actions: '["opened", "reopened", "ready_for_review", "synchronize"]'
          # Manual fallbacks: comment on the PR (first line must be the command), e.g.:
          # /describe   - "what this PR does" (there is no /summary; this is the summary tool)
          # /review
          # /improve
          # /ask ...
