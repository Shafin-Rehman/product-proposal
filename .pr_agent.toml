# Local overrides for Codium / Qodo PR-Agent (complements .github/workflows/pr_agent.yml).
# See: https://qodo-merge-docs.qodo.ai/usage-guide/automations_and_usage/

[config]
# Optional: stricter or looser; align with the workflow if you change models.
temperature = 0.2

# NVIDIA DeepSeek: thinking blocks can break structured /improve output; the workflow
# can also set litellm.extra_body — keep this in one place to match NVIDIA's sample.

[litellm]
extra_body = """{"chat_template_kwargs":{"thinking":false}}"""

[pr_reviewer]
# More than the default 3; increase for a deeper (noisier) pass.
num_max_findings = 12
require_security_review = true
require_tests_review = true
extra_instructions = """
Be thorough: reason about the change in the full PR and product context, not only the diff hunk.
Call out real bugs, missed edge cases, and maintainability. Prefer line-relevant, actionable
comments. When you suggest a fix, show concrete code. Stay concise but not shallow.
"""

[pr_code_suggestions]
# /improve: more suggestions per chunk can surface more line-level nits (higher cost).
num_code_suggestions_per_chunk = 4
# Lower threshold = publish more candidate suggestions (noisier).
suggestions_score_threshold = 0
focus_only_on_problems = true
extra_instructions = """
Suggest only concrete, applicable improvements. Prefer specific line or block-level fixes
with a short rationale. If something is already fine, skip it.
"""
