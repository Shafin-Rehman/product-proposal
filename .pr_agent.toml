# PR-Agent: Copilot-style defaults for your repo. Docs:
# https://qodo-merge-docs.qodo.ai/usage-guide/automations_and_usage/

[config]
temperature = 0.2
duplicate_prompt_examples = true

# NVIDIA/OpenAI-compatible: keep unsupported OpenAI params from reaching NVIDIA.
# Do not set litellm.extra_body here: current PR-Agent only allows processing_mode/service_tier
# in that setting, so chat_template_kwargs or reasoning_effort would abort before the API call.
[litellm]
drop_params = true

# High-level "what this PR does" (posted as a comment so your title/body are not replaced).
[pr_description]
publish_description_as_comment = true
add_original_user_description = true
final_update_message = false

[pr_reviewer]
num_max_findings = 12
require_security_review = true
require_tests_review = true
extra_instructions = """
Review like a staff engineer: product context, correctness, edge cases, security, tests, and
maintainability. Prefer concise, actionable inline feedback where GitHub allows it; use the
summary for themes and risk.
"""

[pr_code_suggestions]
# Committable, Copilot-style suggestion blocks in the diff when the provider supports it.
commitable_code_suggestions = true
num_code_suggestions_per_chunk = 4
suggestions_score_threshold = 0
focus_only_on_problems = true
extra_instructions = """
Provide concrete, apply-ready suggestions with a short reason. Flag real issues and clear wins; skip
nit-only churn unless it matters for correctness or security.
"""
